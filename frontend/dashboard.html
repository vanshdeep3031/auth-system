<!DOCTYPE html>
<html>
<body>

<h2>Welcome to Dashboard 🎉</h2>
<button onclick="logout()">Logout</button>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}
</script>

</body>
</html>
